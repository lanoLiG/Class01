<!-- CSRF 防御已启用 - 所有 POST 请求需要携带 csrf_token -->
{% extends "base.html" %}
{% block content %}
<div class="card upload-card">
    <h2>上传头像</h2>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="success-msg">头像上传成功！</div>
        <div class="upload-preview">
            <h3>图片预览</h3>
            <img src="{{ file_url }}" alt="头像预览" class="preview-img">
            <p class="file-link">
                <strong>原始文件名：</strong>{{ original_filename }}<br>
                <strong>保存文件名：</strong>{{ filename }}<br>
                <strong>文件链接：</strong><a href="{{ file_url }}" target="_blank">{{ file_url }}</a>
            </p>
        </div>
        <hr class="divider">
        <p style="margin-top:16px;"><a href="/upload" class="btn btn-primary">继续上传</a></p>
    {% else %}
        <form method="post" action="/upload" enctype="multipart/form-data" class="upload-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="file">选择头像文件</label>
                <input type="file" id="file" name="file" class="file-input" accept="image/*">
            </div>

            <button type="submit" class="btn btn-primary">上传</button>
        </form>
    {% endif %}
</div>
{% endblock %}
