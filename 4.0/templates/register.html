<!-- CRITICAL: CSRF 防御已启用 - 所有 POST 请求必须携带 csrf_token -->
{% extends "base.html" %}
{% block content %}
<div class="card register-card">
    <h2>用户注册</h2>
    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="post" action="/register" class="register-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" maxlength="64" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" maxlength="128" required>
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="text" id="phone" name="phone" placeholder="请输入手机号">
        </div>
        <button type="submit" class="btn btn-primary">注册</button>
    </form>
    <p class="form-footer">已有账号？<a href="/login">立即登录</a></p>
</div>
{% endblock %}
