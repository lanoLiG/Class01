{% extends "base.html" %}
{% block content %}
<div class="card profile-card">
    <h2>个人中心</h2>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    {% if user %}
        <div class="user-info">
            <h3>用户资料</h3>
            <ul class="info-list">
                <li><span class="label">ID：</span>{{ user.id }}</li>
                <li><span class="label">用户名：</span>{{ user.username }}</li>
                <li><span class="label">邮箱：</span>{{ user.email }}</li>
                <li><span class="label">手机：</span>{{ user.phone }}</li>
                <li><span class="label">余额：</span>{{ user.balance }}</li>
            </ul>
        </div>

        <hr class="divider">

        <div class="recharge-section">
            <h3>充值</h3>
            <form method="post" action="/recharge" class="recharge-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="user_id" value="{{ user.id }}">

                <div class="form-group">
                    <label for="amount">充值金额</label>
                    <input type="text" id="amount" name="amount" placeholder="请输入充值金额" required>
                </div>

                <button type="submit" class="btn btn-primary">充值</button>
            </form>
        </div>

        <div class="change-password-section">
            <h3>修改密码</h3>
            <form method="post" action="/change-password" class="change-password-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="username" value="{{ user.username }}">

                <div class="form-group">
                    <label for="new_password">新密码</label>
                    <input type="password" id="new_password" name="new_password" placeholder="请输入新密码" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">确认密码</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="请再次输入新密码" required>
                </div>

                <button type="submit" class="btn btn-primary">修改密码</button>
            </form>
        </div>

        <hr class="divider">

        <div class="action-links">
            <a href="/" class="btn">返回首页</a>
        </div>
    {% endif %}
</div>
{% endblock %}
